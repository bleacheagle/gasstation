<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; }
        .table-wrapper { overflow: auto; background: white; border: 1px solid #d2d2d7; border-radius: 12px; }
        th, td { padding: 8px; border: 1px solid #d2d2d7; text-align: center; font-size: 12px; }
        .cell-input { width: 100%; border: none; text-align: center; }
    </style>
</head>
<body>

<div id="app" class="p-6">
    <div v-if="!isLoggedIn" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-xl font-bold mb-6 text-center">System Login</h2>
        <input v-model="email" type="email" placeholder="Email" class="w-full border p-2 mb-4 rounded">
        <input v-model="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
        <button @click="login" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
    </div>

    <div v-else>
        <div class="flex justify-between mb-4">
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <button @click="logout" class="bg-gray-200 px-4 py-1 rounded">Logout</button>
        </div>
        
        <div v-if="!currentSheetId" class="grid grid-cols-2 gap-4">
            <button @click="fetchSheets" class="bg-blue-100 p-6 rounded-xl font-bold">Load Sheets</button>
            <div v-for="s in sheets" :key="s.id" @click="selectSheet(s.id)" class="bg-white p-4 border rounded-xl cursor-pointer">
                {{ s.period }}
            </div>
        </div>

        <div v-else class="table-wrapper">
            <button @click="currentSheetId = null" class="mb-4">◀ Back</button>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Title</th><th>Amount(A)</th></tr>
                </thead>
                <tbody>
                    <tr v-for="row in employees" :key="row.id">
                        <td>{{ row.id }}</td>
                        <td><input v-model="row.name" class="cell-input"></td>
                        <td>{{ row.title }}</td>
                        <td><input type="number" v-model="row.amountA" class="cell-input"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;
    const client = supabase.createClient("https://umgpzjdfpfnogggzecmj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtZ3B6amRmcGZub2dnZ3plY21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzQwNDUsImV4cCI6MjA5Njg1MDA0NX0.RTVss_RIcMCLAMf8XrUiyBab07kgloG2mTEQ7gL10rA");

    createApp({
        setup() {
            const isLoggedIn = ref(false);
            const email = ref('');
            const password = ref('');
            const sheets = ref([]);
            const currentSheetId = ref(null);
            const employees = ref([]);

            const login = async () => {
                const { error } = await client.auth.signInWithPassword({ email: email.value, password: password.value });
                if (error) alert(error.message); else isLoggedIn.value = true;
            };

            const logout = async () => { await client.auth.signOut(); isLoggedIn.value = false; };
            const fetchSheets = async () => { const { data } = await client.from('payroll_sheets').select('*'); sheets.value = data; };
            const selectSheet = async (id) => { 
                currentSheetId.value = id;
                const { data } = await client.from('employees').select('*').eq('sheet_id', id);
                employees.value = data;
            };

            return { isLoggedIn, email, password, login, logout, sheets, currentSheetId, selectSheet, employees, fetchSheets };
        }
    }).mount('#app');
</script>
</body>
</html>
